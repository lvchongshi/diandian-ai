  const [importCursor, setImportCursor] = useState(0);
  const [exp, setExp] = useState(62);
  const [level, setLevel] = useState(3);
  const [isTyping, setIsTyping] = useState(false);
  const [hydrated, setHydrated] = useState(false);
  const [showSplash, setShowSplash] = useState(true);
  const [mobilePanelOpen, setMobilePanelOpen] = useState(false);
  const messagesEndRef = useRef(null);

  useEffect(() => {
    const seen = localStorage.getItem("diandian_splash_seen_v4");
    if (seen) { setShowSplash(false); return; }
    const t = setTimeout(() => {
      setShowSplash(false);
      try { localStorage.setItem("diandian_splash_seen_v4", "1"); } catch(e){}
    }, 3100);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data.messages) setMessages(data.messages);
        if (data.tags) setTags(data.tags);
        if (data.notes) setNotes(data.notes);
        if (typeof data.importCursor === "number") setImportCursor(data.importCursor);
        if (typeof data.exp === "number") setExp(data.exp);
        if (typeof data.level === "number") setLevel(data.level);
      } else {
        setMessages([{
          id: Date.now(), role: "ai",
          text: "充时，下午好呀～\n我注意到你今天又在主站搜了「大厂实习面经」，要不要我把你收藏夹里的几篇硬核笔记串成一份冲刺计划？",
          cite: true, citedNotes: [1, 3, 5],
          suggests: ["7天后端冲刺计划怎么排", "RocketMQ 面试高频考点", "项目经历怎么写更打动面试官"],
        }]);
      }
    } catch(e){}
    setHydrated(true);
  }, []);

  useEffect(() => {
    if (!hydrated) return;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({messages,tags,notes,importCursor,exp,level})); } catch(e){}
  }, [messages, tags, notes, importCursor, exp, level, hydrated]);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, isTyping]);

  /* 工具：直接合成一条 AI 消息（不走 generateAIReply） */
  const pushAIMessage = (payload) => {
    setMessages((prev) => [...prev, {
      id: Date.now() + Math.random(),
      role: "ai",
      text: payload.text,
      cite: !!payload.cite,
      citedNotes: payload.citedNotes || [],
      suggests: payload.suggests || [],
    }]);
  };

  const addExp = (n) => {
    setExp((e) => {
      const next = e + n;
      if (next >= 100) { setLevel((lv) => lv + 1); return next - 100; }
      return next;
    });
  };

  const handleSend = (textOverride) => {
    const text = (textOverride ?? input).trim();
    if (!text) return;
    setMessages((prev) => [...prev, { id: Date.now(), role: "user", text }]);
    setInput("");

    const tagMatch = matchKeyword(text, KEYWORD_TO_TAG);
    if (tagMatch && !tags.find((t) => t.label === tagMatch.tag)) {
      setTimeout(() => {
        setTags((prev) => [{ id: "t" + Date.now(), label: tagMatch.tag, hot: true, fresh: true }, ...prev]);
      }, 600);
    }

    addExp(7);

    setIsTyping(true);
    setTimeout(() => {
      const reply = generateAIReply(text);
      const noteMatch = matchKeyword(text, KEYWORD_TO_NOTES);
      const sugMatch = matchKeyword(text, KEYWORD_TO_SUGGESTS);
      setMessages((prev) => [...prev, {
        id: Date.now() + 1, role: "ai",
        text: reply.text, cite: reply.cite,
        citedNotes: noteMatch ? noteMatch.noteIds : [],
        suggests: sugMatch ? sugMatch.suggests : (reply.cite ? [] : DEFAULT_SUGGESTS),
      }]);
      setIsTyping(false);
    }, 900);
  };

  /* Action: 点击搜推心流的 Tag */
  const handleAskAboutTag = (tagLabel) => {
    if (!tagLabel) return;
    setMobilePanelOpen(false);
    handleSend("聊聊「" + tagLabel + "」吧");
  };

  /* Action: 查看完整数字分身报告 */
  const handleViewPersonaReport = () => {
    setMobilePanelOpen(false);
    addExp(4);
    setIsTyping(true);
    setTimeout(() => {
      pushAIMessage({
        text: "📊 充时的数字分身周报 · 2026 W21\n\n关注重心：求职 48% · 学术 35% · 生活 17%\n默契度本周 +24，活跃天数 7/7\n新增 1 个画像标签：「面试黑马」\n\n💡 我的观察：\n你这周在主站平均每天浏览 23 篇笔记，深度阅读 4 篇，比上周多 1 篇——看得出来春招节奏起来了。建议每天再留 30 分钟系统刷题，6 月前能把算法这块的底子打透。\n\n要不要把这份报告导出到收藏夹，方便复盘？",
        cite: false,
        suggests: ["导出到收藏夹", "下周再生成一份", "对比一下上周的数据"],
      });
      setIsTyping(false);
    }, 800);
  };

  /* Action: 从主站收藏夹导入更多笔记 */
  const handleImportMore = () => {
    setMobilePanelOpen(false);
    const remaining = IMPORTABLE_NOTES.length - importCursor;
    if (remaining <= 0) {
      pushAIMessage({
        text: "你的主站收藏夹里已经全部同步过来啦～新收藏的笔记会在 24 小时内自动同步给我。",
        cite: false,
        suggests: ["按主题给我做一份导览", "整理一下旧笔记"],
      });
      return;
    }
    const batch = IMPORTABLE_NOTES.slice(importCursor, importCursor + 2);
    setNotes((prev) => [...batch, ...prev]);
    setImportCursor((c) => c + batch.length);
    addExp(4);

    setIsTyping(true);
    setTimeout(() => {
      pushAIMessage({
        text: "已为你从主站收藏夹同步了 " + batch.length + " 篇新笔记：\n" +
              batch.map((n) => "• 《" + n.title + "》  @" + n.author).join("\n") +
              "\n\n要我帮你做个简单的串讲吗？",
        cite: true,
        citedNotes: batch.map((n) => n.id),
        suggests: ["给我做个简单串讲", "按主题分类", "推荐类似的"],
      });
      setIsTyping(false);
    }, 700);
  };

  const canImportMore = importCursor < IMPORTABLE_NOTES.length;

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
  };

  const handleResetMemory = () => {
    if (!confirm("确定要清空点点的记忆吗？\n所有对话、Tag 和默契度都会重置。")) return;
    try {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem("diandian_splash_seen_v4");
    } catch(e){}
    setMessages([{
      id: Date.now(), role: "ai",
      text: "记忆已重置～充时，我们重新认识一下吧！",
      cite: false, citedNotes: [], suggests: DEFAULT_SUGGESTS,
    }]);
    setTags(INITIAL_FOOTPRINT_TAGS);
    setNotes(COLLECTED_NOTES);
    setImportCursor(0);
    setExp(62); setLevel(3);
    setMobilePanelOpen(false);
  };

  return (
    <div className="min-h-screen light-bg text-xhs-ink">
      {showSplash && (
        <div className="splash-overlay">
          <div className="splash-card">
            <div className="splash-avatar"><Icon name="chat" className="w-10 h-10 text-white" strokeWidth={2.4} /></div>
            <div className="splash-title">点点 · 充时的专属分身</div>
            <div className="splash-sub">正在加载你的小红书足迹与收藏夹…</div>
            <div className="splash-dots"><span/><span/><span/></div>
          </div>
        </div>
      )}

      <TopNav onReset={handleResetMemory} onTogglePanel={() => setMobilePanelOpen((v) => !v)} mobilePanelOpen={mobilePanelOpen} />

      <main className="max-w-[1400px] mx-auto px-3 sm:px-4 lg:px-6 pb-8">
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-4 lg:gap-5">
          <section className="lg:col-span-7 xl:col-span-7">
            <div className="chat-shell bg-white rounded-3xl shadow-card overflow-hidden flex flex-col h-[calc(100vh-104px)] min-h-[640px] border border-xhs-line">
              <ChatHeader exp={exp} level={level} />

              <div className="chat-stream flex-1 overflow-y-auto light-scroll px-4 sm:px-5 lg:px-6 py-5 space-y-5">
                {messages.map((m, idx) => (
                  <MessageBubble
                    key={m.id}
                    msg={m}
                    notes={notes}
                    isLast={idx === messages.length - 1 && !isTyping}
                    onSuggest={handleSend}
                  />
                ))}
                {isTyping && <TypingBubble />}
                <div ref={messagesEndRef} />
              </div>

              <div className="px-4 sm:px-5 lg:px-6 pb-5 pt-3 border-t border-xhs-line">
                <div className="flex items-center gap-2 bg-xhs-bg rounded-full px-4 py-2.5 border border-transparent focus-within:border-xhs-red/30 focus-within:bg-white focus-within:shadow-glow transition-all">
                  <button className="shrink-0 w-7 h-7 rounded-full text-xhs-sub hover:text-xhs-red transition-colors flex items-center justify-center" title="语音输入">
                    <Icon name="mic" className="w-4 h-4" />
                  </button>
                  <input
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyDown={handleKeyDown}
                    placeholder="给点点发消息…"
                    className="flex-1 bg-transparent outline-none text-sm placeholder:text-xhs-mute text-xhs-ink min-w-0"
                  />
                  {input.trim() ? (
                    <button onClick={() => handleSend()}
                      className="shrink-0 w-9 h-9 rounded-full xhs-grad text-white flex items-center justify-center hover:scale-105 active:scale-95 transition-transform shadow-glow">
                      <Icon name="send" className="w-4 h-4" />
                    </button>
                  ) : (
                    <button className="shrink-0 w-7 h-7 rounded-full text-xhs-sub hover:text-xhs-red transition-colors flex items-center justify-center" title="拍照识别">
                      <Icon name="camera" className="w-4 h-4" />
                    </button>
                  )}
                </div>
                <p className="mt-2 text-[10.5px] text-xhs-mute text-center">
                  内容由 AI 生成，仅供参考 · 数据仅存于本地浏览器
                </p>
              </div>
            </div>
          </section>

          <aside className={"lg:col-span-5 xl:col-span-5 space-y-4 lg:max-h-[calc(100vh-104px)] lg:overflow-y-auto light-scroll lg:pr-1 " + (mobilePanelOpen
              ? "fixed inset-0 z-40 light-bg p-4 pt-20 overflow-y-auto lg:static lg:p-0 lg:pt-0"
              : "hidden lg:block")}>
            {mobilePanelOpen && (
              <div className="lg:hidden flex items-center justify-between mb-3">
                <h2 className="font-bold text-base">我的小红书生态</h2>
                <button onClick={() => setMobilePanelOpen(false)} className="w-9 h-9 rounded-full bg-white border border-xhs-line shadow-card flex items-center justify-center text-xhs-ink">
                  <Icon name="x" className="w-4 h-4" />
                </button>
              </div>
            )}
            <FootprintPanel tags={tags} onTagClick={handleAskAboutTag} />
            <PersonaPanel tags={PERSONA_TAGS} onViewReport={handleViewPersonaReport} />
            <CollectionPanel notes={notes} canImportMore={canImportMore} onImport={handleImportMore} />
          </aside>
        </div>
      </main>
    </div>
  );
}

/* ===== 消息气泡 ===== */
function MessageBubble({ msg, isLast, onSuggest, notes = [] }) {
  if (msg.role === "user") {
    return (
      <div className="flex justify-end anim-slide-up">
        <div className="max-w-[78%] xhs-grad text-white rounded-3xl rounded-tr-lg px-4 py-2.5 text-[14px] shadow-card whitespace-pre-wrap leading-relaxed">
          {msg.text}
        </div>
      </div>
    );
  }
  return (
    <div className="flex gap-2.5 anim-slide-up">
      <div className="shrink-0 w-8 h-8 rounded-2xl xhs-grad flex items-center justify-center text-white shadow-glow">
        <Icon name="chat" className="w-4 h-4" strokeWidth={2.4} />
      </div>
      <div className="flex-1 min-w-0 space-y-2.5">
        <div className="ai-bubble group">
          <div className="bg-xhs-bg rounded-3xl rounded-tl-lg px-4 py-3 text-[14px] leading-relaxed whitespace-pre-wrap text-xhs-ink border border-xhs-line">
            {msg.text}
          </div>
          <div className="bubble-actions mt-1.5 ml-2 flex items-center gap-3 text-xhs-mute">
            <button className="hover:text-xhs-red transition-colors" title="分享">
              <Icon name="share" className="w-3.5 h-3.5" />
            </button>
            <button className="hover:text-xhs-red transition-colors" title="更多">
              <Icon name="more" className="w-3.5 h-3.5" />
            </button>
          </div>
        </div>

        {msg.cite && msg.citedNotes && msg.citedNotes.length > 0 && (
          <div className="space-y-1.5 anim-fade-in">
            <div className="flex items-center gap-1.5 text-[11px] text-xhs-sub px-1">
              <Icon name="bookOpen" className="w-3 h-3" />
              <span>参考了你收藏夹里的 <b className="text-xhs-red">{msg.citedNotes.length}</b> 篇笔记</span>
            </div>
            <div className="grid gap-1.5">
              {msg.citedNotes.map((id) => {
                const note = notes.find((n) => n.id === id);
                if (!note) return null;
                return (
                  <button key={id} className="w-full flex items-center gap-2.5 bg-white border border-xhs-line rounded-2xl px-3 py-2 hover:border-xhs-red/40 hover:shadow-card transition-all group text-left">
                    <div className={"shrink-0 w-9 h-9 rounded-xl bg-gradient-to-br " + note.coverGradient + " flex items-center justify-center text-base"}>
                      {note.coverEmoji}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-[12.5px] font-medium truncate text-xhs-ink group-hover:text-xhs-red transition-colors">{note.title}</div>
                      <div className="text-[10.5px] text-xhs-mute flex items-center gap-1.5 mt-0.5">
                        <span>@{note.author}</span><span>·</span>
                        <Icon name="heart" className="w-2.5 h-2.5" />
                        <span>{note.likes}</span>
                      </div>
                    </div>
                    <Icon name="chevronRight" className="w-4 h-4 text-xhs-mute group-hover:text-xhs-red transition-colors shrink-0" />
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {isLast && msg.suggests && msg.suggests.length > 0 && (
          <div className="pt-1 space-y-1.5 anim-fade-in">
            {msg.suggests.map((s) => (
              <button key={s} onClick={() => onSuggest(s)}
                className="suggest-link group flex items-center gap-1.5 text-[13px] text-xhs-ink/85 hover:text-xhs-red transition-colors">
                <span>{s}</span>
                <Icon name="arrowUpRight" className="w-3.5 h-3.5 text-xhs-mute group-hover:text-xhs-red transition-colors" />
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

          查看完整分身报告 <Icon name="chevronRight" className="w-3 h-3" />
        </button>
      </div>
    </div>
  );
}

/* ===== 专属收藏夹 ===== */
function CollectionPanel({ notes, onImport, canImportMore = true }) {
  const left = notes.filter((_, i) => i % 2 === 0);
  const right = notes.filter((_, i) => i % 2 === 1);
  return (
    <div className="bg-white rounded-3xl border border-xhs-line shadow-card p-5">
      <PanelHeader iconName="bookmark" title="专属收藏夹" subtitle="私域知识库 · 点点的记忆来源"
        accent={<span className="text-[10px] px-1.5 py-0.5 rounded-md bg-xhs-bg text-xhs-ink font-semibold border border-xhs-line">{notes.length} 篇</span>} />
      <div className="mt-3.5 grid grid-cols-2 gap-2.5">
        <div className="space-y-2.5">{left.map((n) => <NoteCard key={n.id} note={n} />)}</div>
        <div className="space-y-2.5">{right.map((n) => <NoteCard key={n.id} note={n} />)}</div>
      </div>
      <button onClick={onImport} disabled={!canImportMore}
        className="mt-3 w-full py-2 rounded-2xl bg-xhs-bg border border-xhs-line text-xs text-xhs-sub hover:text-xhs-red hover:border-xhs-red/30 hover:bg-xhs-redLight font-medium transition-colors flex items-center justify-center gap-1 active:scale-[0.99] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:text-xhs-sub disabled:hover:bg-xhs-bg disabled:hover:border-xhs-line">
        <Icon name="plus" className="w-3 h-3" />{canImportMore ? "从主站收藏夹导入更多" : "已全部同步完毕"}
      </button>
    </div>
  );
}

function NoteCard({ note }) {
  return (
    <div className="rounded-2xl overflow-hidden bg-white border border-xhs-line hover:border-xhs-red/30 hover:-translate-y-0.5 hover:shadow-lift transition-all cursor-pointer group">
      <div className={"bg-gradient-to-br " + note.coverGradient + " relative flex items-center justify-center"} style={{ height: note.height * 0.55 }}>
        <span className="text-4xl drop-shadow-sm">{note.coverEmoji}</span>
        <span className="absolute top-1.5 left-1.5 text-[9px] px-1.5 py-0.5 rounded-md bg-white/85 backdrop-blur text-xhs-ink font-semibold">{note.tag}</span>
      </div>
      <div className="px-2.5 py-2">
        <h4 className="text-[12px] font-medium leading-snug line-clamp-2 text-xhs-ink group-hover:text-xhs-red transition-colors">{note.title}</h4>
        <div className="mt-1.5 flex items-center justify-between text-[10px] text-xhs-mute">
          <div className="flex items-center gap-1 truncate">
            <div className="w-3.5 h-3.5 rounded-full xhs-grad-soft border border-xhs-redLight" />
            <span className="truncate">{note.author}</span>
          </div>
          <div className="flex items-center gap-0.5 shrink-0">
            <Icon name="heart" className="w-2.5 h-2.5" />
            <span>{note.likes}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function PanelHeader({ iconName, title, subtitle, accent }) {
  return (
    <div className="flex items-start justify-between gap-2">
      <div className="flex items-center gap-2.5">
        <div className="w-8 h-8 rounded-2xl xhs-grad-soft text-xhs-red flex items-center justify-center border border-xhs-red/15">
          <Icon name={iconName} className="w-4 h-4" />
        </div>
        <div>
          <h3 className="font-semibold text-sm text-xhs-ink">{title}</h3>
          <p className="text-[11px] text-xhs-mute mt-0.5">{subtitle}</p>
        </div>
      </div>
      {accent}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
